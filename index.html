<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bear’s Den | Private Strength & Movement Coaching (Lambertville, NJ)</title>
  <meta name="description" content="Appointment-only private strength & movement coaching for adults 45+. Lambertville, NJ. Training membership $300/month. Training + recovery membership $450/month. Start with a $75 Movement & Strength Assessment. In-home training available from $60 depending on distance." />
  <link rel="icon" type="image/png" href="./logo.png" />

  <style>
    :root{
      --bg:#0b3b6f;
      --bg2:#062e58;
      --card:#ffffff;
      --ink:#0b1a2a;
      --muted:#516173;
      --accent:#1e5aa8;
      --soft:#e9f0fb;
      --ring:rgba(30,90,168,.25);
      --radius:18px;
      --shadow:0 12px 30px rgba(0,0,0,.15);
      --max:1040px;
      --font: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:var(--font);
      color:var(--ink);
      background:linear-gradient(160deg,var(--bg),var(--bg2));
    }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 18px 64px;
    }

    header{color:#fff}

    .topbar{
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .logo{
      width:66px;
      height:66px;
      border-radius:50%;
      background:#fff;
      overflow:hidden;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      padding:6px;
    }

    .title .name{
      font-weight:800;
      font-size:22px;
    }

    .title .sub{
      font-size:14px;
      opacity:.9;
    }

    .btn{
      padding:10px 14px;
      border-radius:999px;
      text-decoration:none;
      background:rgba(255,255,255,.1);
      color:#fff;
      font-weight:700;
    }

    .btnPrimary{
      background:#fff;
      color:#062e58;
    }

    .hero{
      margin-top:20px;
      background:#fff;
      border-radius:18px;
      overflow:hidden;
    }

    .heroInner{
      display:grid;
      grid-template-columns:1.1fr .9fr;
    }

    .heroCopy{
      padding:26px;
    }

    h1{font-size:34px;}

    .lead{color:#516173;}

    .pill{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:#e9f0fb;
      margin:5px;
    }

    .heroSide{
      padding:20px;
      background:#eef4fb;
    }

    .card{
      background:#fff;
      padding:16px;
      border-radius:14px;
    }

    .price{
      font-size:28px;
      font-weight:900;
      color:#062e58;
    }

    section{
      margin-top:20px;
      background:#fff;
      padding:20px;
      border-radius:18px;
    }

    .studioPhotos{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
    }

    .photoCard img{
      width:100%;
    }

    footer{
      margin-top:20px;
      color:#fff;
      font-size:12px;
    }
  </style>
</head>

<body>
<div class="wrap">

<header>
  <div class="topbar">
    <div class="brand">
      <div class="logo">
        <img src="./logo.png" />
      </div>
      <div class="title">
        <div class="name">Bear’s Den</div>
        <div class="sub">Private Strength & Movement Coaching</div>
      </div>
    </div>

    <div>
      <a class="btn btnPrimary" href="#">Call</a>
      <a class="btn" href="#">Email</a>
    </div>
  </div>
</header>

<section>
  <h2>Studio Preview</h2>

  <div class="studioPhotos">

    <div class="photoCard">
      <!-- UPDATED -->
      <img src="./gymphoto-1.jpg">
      <p>Private training space designed for focused, personal coaching.</p>
    </div>

    <div class="photoCard">
      <!-- UPDATED -->
      <img src="./gymphoto-2.jpg">
      <p>Calm environment for strength and movement.</p>
    </div>

  </div>

</section>

<footer>
  Bear’s Den • Lambertville NJ
</footer>

</div>
</body>
</html>
